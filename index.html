<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
html,body{height:100%;}

body{
    min-height:100dvh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    background:
    linear-gradient(rgba(255,255,255,0.08), rgba(0,0,0,0.4)),
    url('beaa.jpg') no-repeat center center/cover;
    overflow:hidden;
}

.container{
    margin-top:55vh; /* empurra o login pra baixo (abaixo do rosto) */
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    padding:35px 25px;
    border-radius:25px;
    text-align:center;
    color:#fff;
    width:85%;
    max-width:320px;
    box-shadow:0 0 30px rgba(255,0,100,0.2);
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    0%{opacity:0; transform:translateY(60px) scale(0.95); filter:blur(8px);} 
    60%{opacity:1; transform:translateY(-10px) scale(1.02); filter:blur(0);} 
    100%{transform:translateY(0) scale(1);} 
} 
    to{opacity:1;transform:translateY(0);} 
}

h1{
    white-space: nowrap;
    margin-bottom:20px;
    font-size:18px;
    letter-spacing:2px;
    color:#d8b4ff;

    text-shadow:
        0 0 2px #fff,
        0 0 5px #c77dff,
        0 0 10px #a855f7,
        0 0 20px #9333ea,
        0 0 40px #7e22ce,
        0 0 80px #6b21a8;

    animation: neonPulse 1.8s ease-in-out infinite;
}

@keyframes neonPulse{
    0%,100%{
        text-shadow:
        0 0 5px #c77dff,
        0 0 10px #a855f7,
        0 0 20px #9333ea,
        0 0 40px #7e22ce;
        opacity:1;
    }
    50%{
        text-shadow:
        0 0 2px #c77dff,
        0 0 6px #a855f7,
        0 0 12px #9333ea,
        0 0 25px #7e22ce;
        opacity:0.8;
    }
}

.input-box{position:relative;width:100%;}

input{
    width:100%;
    padding:12px 40px 12px 12px;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,0.12);
    color:#fff;
}

input::placeholder{color:#ddd;}

.eye{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
}

button{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#ff4d88,#ff0055);
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

.error{
    margin-top:10px;
    color:#ff8080;
    display:none;
}



/* animação zoom fundo */
@keyframes zoomBg{
    0%{background-size:100%;}
    100%{background-size:110%;}
}

body{
    animation: zoomBg 20s ease-in-out infinite alternate;
}

/* botão pulsando */
@keyframes pulse{
    0%{transform:scale(1); box-shadow:0 0 0 rgba(255,0,100,0.4);} 
    50%{transform:scale(1.05); box-shadow:0 0 20px rgba(255,0,100,0.7);} 
    100%{transform:scale(1); box-shadow:0 0 0 rgba(255,0,100,0.4);} 
}

button{
    animation: pulse 2s infinite;
}

/* brilho passando no card */
.container::before{
    content:'';
    position:absolute;
    top:0; left:-100%;
    width:100%; height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
    animation: shine 4s infinite;
}

@keyframes shine{
    0%{left:-100%;}
    50%{left:100%;}
    100%{left:100%;}
}

</style></head><body><div class="container" id="box">
    <h1 id="title"></h1><div class="input-box">
    <input type="password" id="senha" placeholder="Digite a senha">
    <span class="eye" onclick="toggleSenha()" id="eye">👁️</span>
</div>

<button onclick="verificarSenha()">Entrar 💘</button>

<div class="error" id="erro">Senha incorreta</div>

</div><script>
// texto digitando
const text = "isso é ABSOLUTE...";
let i = 0;
function typing(){
    if(i < text.length){
        document.getElementById('title').innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 60);
    }
}
typing();

function toggleSenha(){
    const input = document.getElementById('senha');
    const eye = document.getElementById('eye');

    if(input.type === 'password'){
        input.type = 'text';
        eye.textContent = '🙈';
    } else {
        input.type = 'password';
        eye.textContent = '👁️';
    }
}

function verificarSenha(){
    const senha = document.getElementById('senha').value;
    const erro = document.getElementById('erro');

    if(senha === 'GUIBI'){
        document.body.innerHTML = '<h1 style="color:white;text-align:center;margin-top:40vh;">Acesso liberado 💘</h1>';
        setTimeout(()=>{
            window.location.href = 'principal.html';
        },1500);
    } else {
        erro.style.display = 'block';
    }
}
</script></body>
</html>
