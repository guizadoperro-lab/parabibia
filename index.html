<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

html,body{
    height:100%;
    overflow:hidden;
}

body{
    height:100dvh;
    display:flex;
    justify-content:center;
    align-items:flex-end;

    background:
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)),
    url('beaa.jpg') no-repeat center center/cover;

    animation: zoomBg 20s ease-in-out infinite alternate;
}

/* zoom fundo */
@keyframes zoomBg{
    from{background-size:100%;}
    to{background-size:110%;}
}

/* container */
.container{
    width:90%;
    max-width:400px;
    padding:30px;
    margin-bottom:40px;

    background:rgba(0,0,0,0.35);
    backdrop-filter: blur(15px);

    border-radius:20px;
    text-align:center;

    box-shadow:0 0 40px rgba(255,0,150,0.4);
}

/* títulos */
#title1{
    font-size:22px;
    color:white;
    margin-bottom:10px;
}

#title2{
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;

    color:#b84dff;

    text-shadow:
    0 0 5px #b84dff,
    0 0 15px #b84dff,
    0 0 30px #ff00ff;

    animation: neonPulse 2s infinite alternate;
}

@keyframes neonPulse{
    from{opacity:0.6;}
    to{opacity:1;}
}

/* input */
.input-box{
    position:relative;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    outline:none;

    background:rgba(255,255,255,0.1);
    color:white;
}

/* olho */
.eye{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
}

/* botão */
button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;

    background:linear-gradient(45deg,#ff0055,#ff3ca6);
    color:white;
    font-weight:bold;
    cursor:pointer;

    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

.error{
    color:#ff8080;
    margin-top:10px;
    display:none;
}

/* tela final CINEMATICA */
.final{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background:black;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    opacity:0;
    animation:fadeIn 1.5s forwards;
}

.final h1{
    font-size:32px;
    text-align:center;

    background: linear-gradient(90deg, #ffffff, #ff4dff, #a64dff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    text-shadow:
    0 0 10px rgba(255,255,255,0.6),
    0 0 25px rgba(255,0,255,0.7),
    0 0 40px rgba(160,0,255,0.9);

    animation:zoomText 3s ease forwards;
}

.final span{
    font-size:40px;
    margin-top:20px;

    animation:heartBeat 1.5s infinite;
}

@keyframes fadeIn{
    to{opacity:1;}
}

@keyframes zoomText{
    from{transform:scale(0.8); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

@keyframes heartBeat{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.2);}
}
</style>
</head>

<body>

<div class="container">
    <h1 id="title1"></h1>
    <h1 id="title2"></h1>

    <div class="input-box">
        <input type="password" id="senha" placeholder="Digite a resposta">
        <span class="eye" onclick="toggleSenha()" id="eye">👁️</span>
    </div>

    <button onclick="verificarSenha()">Responder 💘</button>
    <div class="error" id="erro">Resposta incorreta</div>
</div>

<script>
// frase 1
const text1 = "eu sei que é vc.";
let i = 0;

function typing1(){
    if(i < text1.length){
        document.getElementById('title1').innerHTML += text1.charAt(i);
        i++;
        setTimeout(typing1, 60);
    } else {
        setTimeout(typing2, 500);
    }
}

// frase 2 (neon)
const text2 = "isso é ABSOLUTE?";
let j = 0;

function typing2(){
    if(j < text2.length){
        document.getElementById('title2').innerHTML += text2.charAt(j);
        j++;
        setTimeout(typing2, 70);
    }
}

typing1();

// olho senha
function toggleSenha(){
    const input = document.getElementById('senha');
    const eye = document.getElementById('eye');

    if(input.type === 'password'){
        input.type = 'text';
        eye.textContent = '🙈';
    } else {
        input.type = 'password';
        eye.textContent = '👁️';
    }
}

// verificar senha
function verificarSenha(){
    const senha = document.getElementById('senha').value;
    const erro = document.getElementById('erro');

    if(senha === 'GUIBI'){
        document.body.innerHTML = `
        <div class="final">
            <h1>EU SEI QUE É VOCÊ MEU AMOR</h1>
            <span>🤍</span>
        </div>
        `;

        setTimeout(()=>{
            window.location.href = "principal.html";
        },4000);

    } else {
        erro.style.display = 'block';
    }
}
</script>

</body>
</html>
