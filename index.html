<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

html,body{
    height:100%;
    overflow:hidden;
}

body{
    height:100dvh;
    display:flex;
    justify-content:center;
    align-items:flex-end;

    background:
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)),
    url('beaa.jpg') no-repeat center center/cover;

    animation: zoomBg 20s ease-in-out infinite alternate;
}

/* ZOOM FUNDO */
@keyframes zoomBg{
    0%{background-size:100%;}
    100%{background-size:110%;}
}

/* CARD */
.container{
    width:90%;
    max-width:400px;
    padding:30px;
    margin-bottom:60px;

    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(12px);
    border-radius:20px;

    box-shadow:0 0 60px rgba(140,0,255,0.6);
    text-align:center;
}

/* FRASES */
#frase1{
    color:white;
    font-size:22px;
    margin-bottom:10px;
}

#frase2{
    font-size:30px;
    font-weight:bold;
    margin-bottom:20px;
    opacity:0;

    color:#c400ff;

    text-shadow:
    0 0 10px #c400ff,
    0 0 20px #a000ff,
    0 0 40px #7a00ff;

    animation: pulseNeon 2s infinite;
}

@keyframes pulseNeon{
    0%{opacity:0.6;}
    50%{opacity:1;}
    100%{opacity:0.6;}
}

/* INPUT */
.input-box{
    position:relative;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.1);
    color:white;
}

.eye{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
}

/* BOTÃO */
button{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#ff004c;
    color:white;
    font-weight:bold;
    cursor:pointer;

    animation: pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

/* ERRO */
.error{
    margin-top:10px;
    color:#ff8080;
    display:none;
}

/* CORAÇÕES */
.heart{
    position:fixed;
    bottom:-20px;
    color:#ff4da6;
    animation: subir 6s linear infinite;
}

@keyframes subir{
    0%{transform:translateY(0); opacity:1;}
    100%{transform:translateY(-100vh); opacity:0;}
}

/* TELA FINAL */
#finalScreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    opacity:0;
    pointer-events:none;
    transition:opacity 1s;
    z-index:999;
}

/* TEXTO FINAL NEON */
.finalText{
    font-size:30px;
    text-align:center;
    font-weight:bold;

    opacity:0;
    transform:scale(0.8);

    background: linear-gradient(90deg, #ffffff, #ff4dff, #a64dff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    text-shadow:
    0 0 10px rgba(255,255,255,0.8),
    0 0 25px rgba(255,0,255,0.9),
    0 0 45px rgba(140,0,255,1);

    animation: neonFinal 2s infinite alternate;

    transition:all 1.5s;
}

/* CORAÇÃO PULSANDO */
.heartPulse{
    margin-top:20px;
    font-size:45px;
    animation: heartBeat 1.2s infinite;
}

@keyframes heartBeat{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.3);}
}

/* ANIMAÇÃO FINAL */
@keyframes neonFinal{
    from{filter:brightness(0.8);}
    to{filter:brightness(1.5);}
}

#finalScreen.show{
    opacity:1;
    pointer-events:auto;
}

#finalScreen.show .finalText{
    opacity:1;
    transform:scale(1.1);
}

</style>
</head>

<body>

<div class="container">
    <div id="frase1"></div>
    <div id="frase2"></div>

    <div class="input-box">
        <input type="password" id="senha" placeholder="Digite a resposta">
        <span class="eye" onclick="toggleSenha()" id="eye">👁️</span>
    </div>

    <button onclick="verificarSenha()">Enviar ❤️</button>
    <div class="error" id="erro">Resposta incorreta, amor</div>
</div>

<!-- TELA FINAL -->
<div id="finalScreen">
    <div class="finalText">
        EU SABIA QUE ERA VOCÊ MEU AMOR.
    </div>
    <div class="heartPulse">🤍</div>
</div>

<script>

/* FRASE 1 */
const frase1 = "eu sei que é vc.";
let i = 0;

function digitar(){
    if(i < frase1.length){
        document.getElementById("frase1").innerHTML += frase1.charAt(i);
        i++;
        setTimeout(digitar, 60);
    } else {
        setTimeout(mostrarFrase2, 500);
    }
}

/* FRASE 2 */
function mostrarFrase2(){
    const f2 = document.getElementById("frase2");
    const texto = "isso é ABSOLUTE?";
    let j = 0;

    f2.innerHTML = "";
    f2.style.opacity = 1;

    function escrever(){
        if(j < texto.length){
            f2.innerHTML += texto.charAt(j);
            j++;
            setTimeout(escrever, 70);
        }
    }
    escrever();
}

digitar();

/* OLHO */
function toggleSenha(){
    const input = document.getElementById('senha');
    const eye = document.getElementById('eye');

    if(input.type === 'password'){
        input.type = 'text';
        eye.textContent = '🙈';
    } else {
        input.type = 'password';
        eye.textContent = '👁️';
    }
}

/* VERIFICAR SENHA */
function verificarSenha(){
    const senha = document.getElementById('senha').value;
    const erro = document.getElementById('erro');

    if(senha === 'BIGUI'){

        document.body.style.transition = "0.8s";
        document.body.style.filter = "brightness(0.3)";

        setTimeout(()=>{
            document.getElementById("finalScreen").classList.add("show");
        },400);

        setTimeout(()=>{
            window.location.href = 'principal.html';
        },4000);

    } else {
        erro.style.display = 'block';
    }
}

/* CORAÇÕES */
function criarCoracao(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";

    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (12 + Math.random()*20) + "px";

    document.body.appendChild(heart);

    setTimeout(()=>{heart.remove();},6000);
}

setInterval(criarCoracao, 400);

</script>

</body>
</html>
