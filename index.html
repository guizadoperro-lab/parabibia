<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

html,body{
    height:100%;
    overflow:hidden;
}

body{
    height:100dvh;
    display:flex;
    justify-content:center;
    align-items:flex-end;

    background:
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)),
    url('beaa.jpg') no-repeat center center/cover;

    animation: zoomBg 20s ease-in-out infinite alternate;
}

/* ZOOM FUNDO */
@keyframes zoomBg{
    0%{background-size:100%;}
    100%{background-size:110%;}
}

/* CARD LOGIN */
.container{
    position:relative;
    width:90%;
    max-width:400px;
    padding:30px;
    margin-bottom:60px;

    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(10px);
    border-radius:20px;

    box-shadow:0 0 40px rgba(140,0,255,0.4);
    text-align:center;
}

/* FRASES */
#frase1{
    color:white;
    font-size:22px;
    margin-bottom:10px;
    letter-spacing:1px;
}

#frase2{
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
    opacity:0;
    color:#b700ff;

    text-shadow:
    0 0 5px #b700ff,
    0 0 10px #b700ff,
    0 0 20px #8a00ff;

    animation: pulseNeon 2s infinite;
}

/* NEON PULSANDO */
@keyframes pulseNeon{
    0%{opacity:0.6;}
    50%{opacity:1;}
    100%{opacity:0.6;}
}

/* INPUT */
.input-box{
    position:relative;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,0.1);
    color:white;
}

.eye{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
}

/* BOTÃO */
button{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#ff004c;
    color:white;
    font-weight:bold;
    cursor:pointer;

    animation: pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

/* ERRO */
.error{
    margin-top:10px;
    color:#ff8080;
    display:none;
}

/* CORAÇÕES */
.heart{
    position:fixed;
    bottom:-20px;
    color:#ff4da6;
    font-size:20px;
    animation: subir 6s linear infinite;
}

@keyframes subir{
    0%{transform:translateY(0); opacity:1;}
    100%{transform:translateY(-100vh); opacity:0;}
}

/* FADE */
.fade-out{
    animation: fadeOut 0.8s forwards;
}
.fade-in{
    animation: fadeIn 1s forwards;
}

@keyframes fadeOut{
    to{opacity:0;}
}
@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

</style>
</head>

<body>

<div class="container">
    <div id="frase1"></div>
    <div id="frase2"></div>

    <div class="input-box">
        <input type="password" id="senha" placeholder="Digite a resposta">
        <span class="eye" onclick="toggleSenha()" id="eye">👁️</span>
    </div>

    <button onclick="verificarSenha()">Responder 💘</button>

    <div class="error" id="erro">Resposta incorreta</div>
</div>

<script>

// FRASE 1 (digitando)
const frase1 = "eu sei que é vc.";
let i = 0;

function digitar(){
    if(i < frase1.length){
        document.getElementById("frase1").innerHTML += frase1.charAt(i);
        i++;
        setTimeout(digitar, 60);
    } else {
        setTimeout(mostrarFrase2, 500);
    }
}

function mostrarFrase2(){
    const f2 = document.getElementById("frase2");
    const texto = "isso é ABSOLUTE?";
    let j = 0;

    f2.innerHTML = "";
    f2.style.opacity = 1;

    function escrever(){
        if(j < texto.length){
            f2.innerHTML += texto.charAt(j);
            j++;
            setTimeout(escrever, 70);
        }
    }
    escrever();
}

digitar();

// OLHO SENHA
function toggleSenha(){
    const input = document.getElementById('senha');
    const eye = document.getElementById('eye');

    if(input.type === 'password'){
        input.type = 'text';
        eye.textContent = '🙈';
    } else {
        input.type = 'password';
        eye.textContent = '👁️';
    }
}

// SENHA
function verificarSenha(){
    const senha = document.getElementById('senha').value;
    const erro = document.getElementById('erro');

    if(senha === 'GUIBI'){

        // Fade out suave
        document.body.style.transition = "opacity 0.8s";
        document.body.style.opacity = "0";

        setTimeout(()=>{

            // NOVA TELA
            document.body.innerHTML = `
                <div id="finalMsg" style="
                    height:100vh;
                    display:flex;
                    justify-content:center;
                    align-items:center;
                    background:black;
                    color:white;
                    font-size:24px;
                    text-align:center;
                    padding:20px;
                    opacity:0;
                ">
                    EU SEI QUE É VOCÊ MEU AMOR.🤍
                </div>
            `;

            // Fade IN da mensagem
            setTimeout(()=>{
                document.getElementById("finalMsg").style.transition = "opacity 1s";
                document.getElementById("finalMsg").style.opacity = "1";
            },100);

            // Tempo maior pra aparecer (antes tava muito rápido)
            setTimeout(()=>{
                window.location.href = 'principal.html';
            },3000);

        },800);

    } else {
        erro.style.display = 'block';
    }
}

// CORAÇÕES
function criarCoracao(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";

    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (10 + Math.random()*20) + "px";

    document.body.appendChild(heart);

    setTimeout(()=>{heart.remove();},6000);
}

setInterval(criarCoracao, 500);

</script>

</body>
</html>
