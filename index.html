<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
    height:100vh;display:flex;justify-content:center;align-items:center;
    background:url('sua-foto.jpg') no-repeat center/cover;
    overflow:hidden;
}

.overlay{
    position:absolute;width:100%;height:100%;
    background:radial-gradient(circle at center, rgba(0,0,0,0.6), rgba(0,0,0,0.95));
}

.container{
    position:relative;
    background:rgba(255,255,255,0.06);
    backdrop-filter: blur(18px);
    padding:45px 30px;
    border-radius:25px;
    text-align:center;color:#fff;
    width:330px;
    box-shadow:0 0 40px rgba(255,0,120,0.25);
    animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

h1{
    margin-bottom:30px;font-size:22px;letter-spacing:2px;
    min-height:28px;
}

.input-box{position:relative;width:100%;}

input{
    width:100%;padding:14px 45px 14px 14px;
    border:none;border-radius:12px;outline:none;
    background:rgba(255,255,255,0.12);
    color:#fff;font-size:14px;
    transition:0.3s;
}

input:focus{
    box-shadow:0 0 15px rgba(255,0,120,0.6);
}

input::placeholder{color:#ccc;}

.eye{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    cursor:pointer;font-size:18px;transition:0.3s;
}
.eye:hover{transform:translateY(-50%) scale(1.2);}

button{
    margin-top:22px;width:100%;padding:14px;border:none;border-radius:12px;
    background:linear-gradient(45deg,#ff4d88,#ff0055);
    color:#fff;font-weight:bold;cursor:pointer;
    transition:0.3s;
}
button:hover{transform:scale(1.06);box-shadow:0 0 20px rgba(255,0,120,0.7);} 

.error{
    margin-top:12px;color:#ff8080;display:none;font-size:13px;
}

.shake{animation:shake 0.3s;}
@keyframes shake{
    0%{transform:translateX(0);}25%{transform:translateX(-5px);}50%{transform:translateX(5px);}75%{transform:translateX(-5px);}100%{transform:translateX(0);} }

.heart{
    position:absolute;color:#ff4d88;
    animation:float 6s linear infinite;
}
@keyframes float{
    0%{transform:translateY(100vh);opacity:0;}
    50%{opacity:1;}
    100%{transform:translateY(-10vh);opacity:0;}
}

</style></head><body>
<div class="overlay"></div><div class="container" id="box">
    <h1 id="title"></h1><div class="input-box">
    <input type="password" id="senha" placeholder="Digite a senha">
    <span class="eye" onclick="toggleSenha()" id="eye">👁️</span>
</div>

<button onclick="verificarSenha()">Entrar 💘</button>
<div class="error" id="erro">Senha incorreta</div>

</div><script>
// Texto digitando
const text = "isso é ABSOLUTE...";
let i = 0;
function typing(){
    if(i < text.length){
        document.getElementById('title').innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 70);
    }
}
typing();

function toggleSenha(){
    const input = document.getElementById('senha');
    const eye = document.getElementById('eye');
    if(input.type === 'password'){
        input.type = 'text';
        eye.textContent = '🙈';
    } else {
        input.type = 'password';
        eye.textContent = '👁️';
    }
}

function verificarSenha(){
    const senha = document.getElementById('senha').value;
    const erro = document.getElementById('erro');
    const box = document.getElementById('box');

    if(senha === 'GUIBI'){
        document.body.innerHTML = '<h1 style="color:white;text-align:center;margin-top:40vh;font-size:28px;animation:fadeIn 1s;">Acesso liberado 💘</h1>';
        setTimeout(()=>{window.location.href='principal.html';},1500);
    } else {
        erro.style.display = 'block';
        box.classList.add('shake');
        setTimeout(()=>box.classList.remove('shake'),300);
    }
}

// corações
setInterval(()=>{
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.innerHTML = '❤';
    heart.style.left = Math.random()*100+'vw';
    heart.style.fontSize = (10+Math.random()*25)+'px';
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
},400);

// efeito clique
window.addEventListener('click', e=>{
    const heart = document.createElement('div');
    heart.innerHTML='💖';
    heart.style.position='absolute';
    heart.style.left=e.clientX+'px';
    heart.style.top=e.clientY+'px';
    heart.style.pointerEvents='none';
    heart.style.animation='float 2s ease-out';
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),2000);
});
</script></body>
</html>
