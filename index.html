<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
html,body{height:100%;}

body{
    min-height:100dvh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    background:
    linear-gradient(rgba(255,255,255,0.08), rgba(0,0,0,0.4)),
    url('beaa.jpg') no-repeat center center/cover;
    overflow:hidden;
}

.container{
    margin-top:55vh; /* empurra o login pra baixo (abaixo do rosto) */
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    padding:35px 25px;
    border-radius:25px;
    text-align:center;
    color:#fff;
    width:85%;
    max-width:320px;
    box-shadow:0 0 30px rgba(255,0,100,0.2);
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px);} 
    to{opacity:1;transform:translateY(0);} 
}

h1{
    margin-bottom:20px;
    font-size:20px;
    letter-spacing:2px;
}

.input-box{position:relative;width:100%;}

input{
    width:100%;
    padding:12px 40px 12px 12px;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,0.12);
    color:#fff;
}

input::placeholder{color:#ddd;}

.eye{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
}

button{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#ff4d88,#ff0055);
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

.error{
    margin-top:10px;
    color:#ff8080;
    display:none;
}

</style></head><body><div class="container" id="box">
    <h1 id="title"></h1><div class="input-box">
    <input type="password" id="senha" placeholder="Digite a senha">
    <span class="eye" onclick="toggleSenha()" id="eye">👁️</span>
</div>

<button onclick="verificarSenha()">Entrar 💘</button>

<div class="error" id="erro">Senha incorreta</div>

</div><script>
// texto digitando
const text = "isso é ABSOLUTE...";
let i = 0;
function typing(){
    if(i < text.length){
        document.getElementById('title').innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 60);
    }
}
typing();

function toggleSenha(){
    const input = document.getElementById('senha');
    const eye = document.getElementById('eye');

    if(input.type === 'password'){
        input.type = 'text';
        eye.textContent = '🙈';
    } else {
        input.type = 'password';
        eye.textContent = '👁️';
    }
}

function verificarSenha(){
    const senha = document.getElementById('senha').value;
    const erro = document.getElementById('erro');

    if(senha === 'GUIBI'){
        document.body.innerHTML = '<h1 style="color:white;text-align:center;margin-top:40vh;">Acesso liberado 💘</h1>';
        setTimeout(()=>{
            window.location.href = 'principal.html';
        },1500);
    } else {
        erro.style.display = 'block';
    }
}
</script></body>
</html>
