<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title><style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url('sua-foto.jpg') no-repeat center center/cover;
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
}

.container{
    position:relative;
    background:rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding:30px;
    border-radius:15px;
    text-align:center;
    color:#fff;
    width:300px;
}

h1{
    margin-bottom:20px;
    font-size:20px;
}

.input-box{
    position:relative;
    width:100%;
}

input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    outline:none;
}

.eye{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:18px;
}

button{
    margin-top:15px;
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#ff4d88;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#ff1a66;
}

.error{
    margin-top:10px;
    color:#ff8080;
    display:none;
}

</style></head><body><div class="overlay"></div><div class="container">
    <h1>isso é ABSOLUTE...</h1><div class="input-box">
    <input type="password" id="senha" placeholder="Digite a senha">
    <span class="eye" onclick="toggleSenha()" id="eye">👁️</span>
</div>

<button onclick="verificarSenha()">Entrar</button>

<div class="error" id="erro">Senha incorreta</div>

</div><script>
function toggleSenha(){
    const input = document.getElementById('senha');
    const eye = document.getElementById('eye');

    if(input.type === 'password'){
        input.type = 'text';
        eye.textContent = '🙈';
    } else {
        input.type = 'password';
        eye.textContent = '👁️';
    }
}

function verificarSenha(){
    const senha = document.getElementById('senha').value;
    const erro = document.getElementById('erro');

    if(senha === 'GUIBI'){
        window.location.href = 'principal.html';
    } else {
        erro.style.display = 'block';
    }
}
</script></body>
</html>
