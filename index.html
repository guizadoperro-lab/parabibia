<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
html,body{height:100%;overflow:hidden;}

body{
    height:100dvh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    background:
    linear-gradient(rgba(255,255,255,0.08), rgba(0,0,0,0.4)),
    url('beaa.jpg') no-repeat center center/cover;
    animation: zoomBg 20s ease-in-out infinite alternate;
}

.container{
    margin-top:55vh;
    position:relative;
    background:rgba(255,255,255,0.03);
    backdrop-filter: blur(25px);
    padding:35px 25px;
    border-radius:25px;
    text-align:center;
    color:#fff;
    width:90%;
    max-width:380px;
    box-shadow:0 0 30px rgba(255,0,100,0.2);
    animation:fadeIn 1s ease;
}

h1{
    white-space: nowrap;
    font-size: clamp(14px, 4vw, 18px);
    letter-spacing:2px;
    color:#e9d5ff;
    text-shadow:
        0 0 3px #fff,
        0 0 6px #d946ef,
        0 0 12px #c026d3,
        0 0 24px #a21caf,
        0 0 48px #86198f,
        0 0 80px #701a75;
}

.question{
    margin-top:8px;
    font-size:13px;
    opacity:0.9;
}

.input-box{position:relative;width:100%;margin-top:15px;}

input{
    width:100%;
    padding:12px 40px 12px 12px;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,0.08);
    color:#fff;
}

.eye{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
}

button{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#ff4d88,#ff0055);
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

.error{margin-top:10px;color:#ff8080;display:none;font-size:13px;}

.heart{
    position:absolute;
    bottom:0;
    color:#ff4d88;
    animation:float 5s linear infinite;
}

@keyframes float{
    0%{transform:translateY(0);opacity:0;}
    50%{opacity:1;}
    100%{transform:translateY(-100vh);opacity:0;}
}

@keyframes zoomBg{0%{background-size:100%;}100%{background-size:110%;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

</style></head><body><div class="container">
    <h1 id="title"></h1>
    <div class="question">isso é ABSOLUTE?</div><div class="input-box">
    <input type="password" id="senha" placeholder="Digite a resposta">
    <span class="eye" onclick="toggleSenha()">👁️</span>
</div>

<button onclick="verificarSenha()">Responder 💘</button>

<div class="error" id="erro">Resposta incorreta</div>

</div><script>
// texto principal
const text = "eu sei que é vc.";
let i = 0;

function typing(){
    if(i < text.length){
        document.getElementById('title').innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 60);
    }
}
typing();

function toggleSenha(){
    const input = document.getElementById('senha');
    input.type = input.type === 'password' ? 'text' : 'password';
}

function verificarSenha(){
    const senha = document.getElementById('senha').value;
    const erro = document.getElementById('erro');

    if(senha === 'GUIBI'){
        document.body.innerHTML = '<h1 style="color:white;text-align:center;margin-top:40vh;">sabia que era você 💜</h1>';
        setTimeout(()=>{
            window.location.href = 'principal.html';
        },1500);
    } else {
        erro.style.display = 'block';
    }
}

// corações subindo
setInterval(()=>{
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.innerHTML = '💖';
    heart.style.left = Math.random()*100 + 'vw';
    heart.style.fontSize = (10 + Math.random()*20) + 'px';
    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);
},500);
</script></body>
</html>
