<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
    url('anna.jpg') no-repeat center center/cover;

    overflow:hidden;
}

/* CONTAINER CENTRAL */
.container{
    text-align:center;
    padding:30px;
    border-radius:20px;

    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(10px);

    box-shadow: 0 0 40px rgba(255, 0, 150, 0.5);

    animation: fadeIn 2s ease;
}

/* TEXTO ROSA */
.texto{
    font-size:24px;
    line-height:1.6;
    margin-bottom:30px;

    color:#ff4dc4;

    text-shadow:
    0 0 8px #ff4dc4,
    0 0 18px #ff00cc,
    0 0 30px #ff00ff;

    animation: pulse 2s infinite;
}

/* BOTÃO */
button{
    padding:12px 25px;
    border:none;
    border-radius:10px;

    background: linear-gradient(45deg, #ff4dc4, #ff00aa);
    color:white;
    font-weight:bold;
    font-size:16px;

    cursor:pointer;

    box-shadow: 0 0 20px rgba(255,0,170,0.6);

    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
    box-shadow: 0 0 30px rgba(255,0,170,0.9);
}

/* ANIMAÇÕES */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes pulse{
    0%{opacity:0.7;}
    50%{opacity:1;}
    100%{opacity:0.7;}
}
</style>
</head>

<body>

<div class="container">
    <div class="texto">
        Eu te amo mais do que qualquer coisa nesse mundo. 💖
    </div>

    <button onclick="ir()">Seguir ➜</button>
</div>

<script>
function ir(){
    window.location.href = "proxima.html"; // troca pelo nome da sua próxima página
}
</script>

</body>
</html>
