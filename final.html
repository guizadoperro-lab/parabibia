<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final 💙</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url('neon-blue.jpg') no-repeat center/cover;

    overflow:hidden;
}

/* CONTAINER */
.container{
    text-align:center;
    padding:30px;

    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(12px);
    border-radius:20px;

    box-shadow: 0 0 40px rgba(0,150,255,0.5);

    animation: fadeIn 2s ease;
}

/* TEXTO PRINCIPAL */
.titulo{
    font-size:28px;
    margin-bottom:25px;

    color:#00cfff;

    text-shadow:
    0 0 10px #00cfff,
    0 0 20px #0099ff,
    0 0 40px #0066ff;
}

/* EU TE AMO */
.amor{
    font-size:20px;
    margin:5px 0;
    font-weight:bold;
}

/* CORES DIFERENTES */
.c1{color:#ff4d4d;}
.c2{color:#ff9900;}
.c3{color:#ffff66;}
.c4{color:#66ff66;}
.c5{color:#00ffff;}
.c6{color:#3399ff;}
.c7{color:#cc66ff;}
.c8{color:#ff66cc;}

/* BOTÃO */
button{
    margin-top:25px;
    padding:12px 25px;
    border:none;
    border-radius:10px;

    background: linear-gradient(45deg, #00cfff, #0066ff);
    color:white;
    font-weight:bold;

    cursor:pointer;

    box-shadow: 0 0 20px rgba(0,150,255,0.6);

    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* ANIMAÇÃO */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

    <!-- TEXTO PRINCIPAL (VOCÊ ALTERA) -->
    <div class="titulo">
        Por mais que a gente sempre brigue, a gente sempre se resolve. Isso mostra quem realmente somos, quem amamos e a nossa vontade de permanecer um ao lado do outro.
        Bia, você é o meu bem precioso 🤍
    </div>

    <!-- EU TE AMO (2 JUNTOS PRA FACILITAR) -->
    <div class="amor c1">eu te amo</div>
    <div class="amor c2">eu te amo</div>

    <!-- OUTROS -->
    <div class="amor c3">eu te amo</div>
    <div class="amor c4">eu te amo</div>
    <div class="amor c5">eu te amo</div>
    <div class="amor c6">eu te amo</div>
    <div class="amor c7">eu te amo</div>
    <div class="amor c8">eu te amo</div>

    <button onclick="irFinal2()">Final 💙</button>

</div>

<script>
function irFinal2(){
    window.location.href = "final2.html"; // verdadeiro final
}
</script>

</body>
</html>
