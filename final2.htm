<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;

    background: linear-gradient(rgba(40,0,10,0.95), rgba(15,0,5,1));
    color:white;
}

/* IMAGEM */
.topo-img{
    width:90%;
    max-width:500px;
    margin-top:30px;
    border-radius:20px;

    box-shadow: 0 0 30px rgba(255,0,80,0.4);

    opacity:0;
    transform:translateY(40px);
    animation: fadeUp 1.5s ease forwards;
}

/* TEXTO PRINCIPAL */
.texto{
    margin:30px 20px;
    text-align:center;

    font-size:22px;
    line-height:1.6;

    color:#ff4d88;

    text-shadow:
    0 0 8px #ff4d88,
    0 0 20px #ff0066;

    opacity:0;
    transform:translateY(40px);
    animation: fadeUp 1.5s ease forwards;
    animation-delay:0.5s;
}

/* BOTÃO */
.link-btn{
    margin-bottom:10px;
    padding:14px 25px;

    background:#ff0055;
    color:white;
    text-decoration:none;
    font-weight:bold;

    border-radius:12px;

    box-shadow: 0 0 20px rgba(255,0,85,0.6);

    transition:0.3s;

    opacity:0;
    transform:translateY(40px);
    animation: fadeUp 1.5s ease forwards;
    animation-delay:1s;
}

.link-btn:hover{
    transform:scale(1.05);
}

/* TEXTO FINAL */
.texto-final{
    margin-top:15px;
    text-align:center;

    font-size:18px;
    line-height:1.6;

    color:#ff6b9e;

    text-shadow:
    0 0 6px #ff6b9e,
    0 0 15px #ff0055;

    opacity:0;
    transform:translateY(40px);
    animation: fadeUp 1.5s ease forwards;
    animation-delay:1.3s;
}

/* ANIMAÇÃO */
@keyframes fadeUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<img src="bigui.jpg" class="topo-img">

<div class="texto">
    esse é o nosso maior sonho, né meu amor? 
</div>

<a href="https://vt.tiktok.com/ZS9MoRdMg/" class="link-btn">
    abrir
</a>

<div class="texto-final">
    nada, nada, nada<br>
    mudaram minha sorte se você nao esta aqui.
</div>

</body>
</html>
